services:
  web:
    image: node:20-bullseye
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    environment:
      NODE_ENV: development
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: 1
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    command: bash -lc "npm install --no-audit --no-fund && npx prisma generate && npx prisma migrate deploy && npm run dev -- -H 0.0.0.0 -p 3000"

volumes:
  node_modules:
